name: Phantom APK Build 2026
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Buildozer'ın tüm bağımlılıkları içeren resmi Docker konteynerini kullanıyoruz
      - name: Build with Buildozer (Dockerized)
        uses: docker://kivy/buildozer:latest
        with:
          args: android debug
        env:
          BUILDOZER_ALLOW_ORG_NAME_AS_DOMAIN: "1"

      # APK oluştuktan sonra en güncel (v4) yükleme aracını kullanıyoruz
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Phantom-Stable-APK
          path: bin/*.apk
