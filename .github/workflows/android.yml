name: Phantom APK Build Final
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 2026'nın en stabil yöntemi: Hazır Docker imajı kullanmak
      - name: Build with Buildozer
        uses: docker://kivy/buildozer:latest
        with:
          args: android debug
        env:
          BUILDOZER_ALLOW_ORG_NAME_AS_DOMAIN: "1"

      # APK oluştuktan sonra güvenli şekilde dışarı çıkarıyoruz
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Phantom-Final-APK
          path: bin/*.apk
