name: Phantom Final Build
on: [push]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      # 1. Adım: Tüm bağımlılıkları en stabil sürümde kur
      - name: Setup System
        run: |
          sudo apt update
          sudo apt install -y build-essential git python3 python3-dev python3-pip zip unzip libtool autoconf libssl-dev libffi-dev libgmp-dev zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libgomp1 libsqlite3-dev
          pip3 install --user --upgrade Cython==0.29.33 buildozer

      # 2. Adım: Yetki hatasını kökten çözmek için klasör sahipliğini al
      - name: Fix Permissions
        run: sudo chown -R runner:docker .

      # 3. Adım: Buildozer'ı 'yes' ile zorla ve root engelini kır
      - name: Build APK
        run: |
          export PATH=$PATH:$HOME/.local/bin
          # Root uyarısını ve EOF hatasını tek satırda geçiyoruz
          yes | buildozer -v android debug
        env:
          BUILDOZER_ALLOW_ORG_NAME_AS_DOMAIN: "1"
          BUILDOZER_WARN_ON_ROOT: "0"

      # 4. Adım: APK dosyasını kurtar
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Phantom-APK
          path: bin/*.apk
