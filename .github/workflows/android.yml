name: Phantom APK Build 2026 Fix
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Force Build with No-Root Warning
        uses: docker://kivy/buildozer:latest
        with:
          # Soru sormasını beklemek yerine direkt komutu basıyoruz
          args: android debug
        env:
          # BU KISIM KRİTİK: Buildozer'ın soru sormasını kökten engelliyoruz
          BUILDOZER_ALLOW_ORG_NAME_AS_DOMAIN: "1"
          BUILDOZER_WARN_ON_ROOT: "0"

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: Phantom-Stable-APK
          path: bin/*.apk
