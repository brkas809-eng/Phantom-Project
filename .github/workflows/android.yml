name: Phantom Stable Build 2026
on: [push]

jobs:
  build:
    runs-on: ubuntu-22.04 # En güncel hata veren sürüm yerine en stabil sürümü seçtik
    steps:
      - uses: actions/checkout@v4

      # Buildozer için gerekli olan tüm araçları içeren profesyonel Action
      - name: Build with Buildozer
        uses: ArtemSBulgakov/buildozer-action@v1
        with:
          buildozer_version: master
          command: buildozer android debug
          repository_root: .

      # APK dosyasını güvenli bölgeye alıyoruz
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Phantom-APK
          path: bin/*.apk
