name: Phantom APK Build 2026 Final
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build with Buildozer (Force Mode)
        uses: docker://kivy/buildozer:latest
        with:
          # 'yes' komutu ile "Emin misin?" sorularına otomatik 'y' cevabı veriyoruz
          args: /bin/bash -c "yes | buildozer android debug"
        env:
          # Root izni hatasını bu çevre değişkeniyle baypas ediyoruz
          BUILDOZER_ALLOW_ORG_NAME_AS_DOMAIN: "1"
          BUILDOZER_WARN_ON_ROOT: "0"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Phantom-Stable-Build
          path: bin/*.apk
