name: Phantom Final Protocol
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt update
          sudo apt install -y python3-pip build-essential git python3-setuptools \
          libffi-dev libssl-dev python3-dev zip unzip libtool autoconf autogen \
          pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 \
          cmake libgomp1 libsqlite3-dev

      - name: Install Buildozer & Hack Root Check
        run: |
          pip3 install --user buildozer
          # İŞTE ÇÖZÜM: Buildozer'ın içindeki root kontrol fonksiyonunu etkisiz hale getiriyoruz
          find ~/.local -name "__init__.py" | grep buildozer | xargs sed -i 's/self.check_root()/# self.check_root()/g'

      - name: Build APK (No Questions Asked)
        run: |
          export PATH=$PATH:~/.local/bin
          # Root uyarısı vermeden direkt inşa başlıyor
          buildozer android debug
        env:
          BUILDOZER_ALLOW_ORG_NAME_AS_DOMAIN: "1"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Phantom-APK-Final
          path: bin/*.apk
